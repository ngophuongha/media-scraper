version: "3.8"

services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: media
    ports:
      - "3306:3306"

  api:
    build: ./apps/backend
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: secret
      DB_NAME: media
    depends_on:
      - db

  web:
    build: ./apps/frontend
    ports:
      - "5173:80"
    depends_on:
      - api