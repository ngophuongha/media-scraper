version: "3.8"

services:
  db:
    image: mysql:8
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql  
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: media_scraper
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3306:3306"

  api:
    build: ./apps/backend
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USER: appuser
      DB_PASSWORD: apppass
      DB_NAME: media_scraper
      DB_PORT: 3306
    depends_on:
      - db

  web:
    build: ./apps/frontend
    ports:
      - "5173:80"
    depends_on:
      - api